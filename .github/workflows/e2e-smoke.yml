name: E2E smoke (bootstrap)

# Bootstrap-mode end-to-end smoke test: seed a fresh DB, boot a live
# uvicorn server, and drive the real HTTP API through the smoke suite
# (chafan-core/smoke). Post-response fan-out (feed, notifications) runs in
# process via FastAPI BackgroundTasks, so no separate worker is needed. This
# is the CI-safe mode — it invents its own users/site/data and needs no
# secrets.
#
# The "real world" mode of the suite (hitting api.cha.fan with real accounts)
# is intentionally NOT run here; it is a manual, credentialed operation.

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main

    - name: Setup Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main
      with:
        use-flakehub: false

    - name: Create database
      run: |
        set -a
        source env.ci
        set +a
        nix develop --command bash -c "
          set -e
          psql -h localhost -p 5432 -U postgres -c 'create database chafan_dev;'
        "

    - name: Run e2e smoke suite (bootstrap mode)
      run: |
        set -a
        source env.ci
        set +a
        nix develop --command bash -c "
          set -e
          ./scripts/e2e/run_e2e_smoke.sh
        "
